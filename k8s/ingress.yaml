apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campconnect-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: campconnect.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /backoffice
            pathType: Prefix
            backend:
              service:
                name: backoffice-service
                port:
                  number: 80