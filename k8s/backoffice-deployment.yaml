apiVersion: apps/v1
kind: Deployment
metadata:
  name: backoffice
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backoffice
  template:
    metadata:
      labels:
        app: backoffice
    spec:
      containers:
        - name: backoffice
          image: sidahmed1511/campconnect-backoffice:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-service
  namespace: production
spec:
  selector:
    app: backoffice
  ports:
    - port: 80
      targetPort: 80